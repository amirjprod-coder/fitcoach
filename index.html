<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0d14" />
<title>FitCoach</title>

<!-- PWA / installable on phone home screen -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FitCoach" />

<style>
  :root{
    --bg:#0a0d14; --panel:#12161f; --panel2:#171c28; --line:#232a38;
    --text:#e9eef6; --muted:#8b96a8; --dim:#5d6675;
    --navy:#15294f; --navyhi:#1f3d77; --navytag:#0f1d3a;
    --accent:#b4ff3d; --accent2:#7ee0ff; --warn:#ff8a5b; --good:#4ade80; --bad:#f87171;
    --r:14px;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none}
  body{padding-bottom:calc(72px + var(--safe-b))}
  h1,h2,h3,h4{margin:0;font-weight:800;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  .hide{display:none!important}

  /* ---- App header ---- */
  header.app{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#0d111b,#0a0d14);
    padding:calc(10px + var(--safe-t)) 16px 10px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;letter-spacing:.5px}
  .brand .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .brand small{color:var(--accent);font-weight:900}
  .hbtn{font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
    padding:7px 11px;border-radius:20px;font-weight:700}

  main{padding:14px 14px 30px;max-width:760px;margin:0 auto}

  /* ---- Cards ---- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:13px}
  .card h3{font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:11px}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .muted{color:var(--muted)}.dim{color:var(--dim)}
  .big{font-size:30px;font-weight:900;letter-spacing:-.02em}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.04em}
  .pill.acc{background:rgba(180,255,61,.14);color:var(--accent)}
  .pill.blue{background:rgba(126,224,255,.14);color:var(--accent2)}
  .pill.warn{background:rgba(255,138,91,.15);color:var(--warn)}

  /* ---- Buttons ---- */
  .btn{display:block;width:100%;text-align:center;padding:15px;border-radius:12px;font-weight:800;
    font-size:15px;background:var(--accent);color:#0a0d14;letter-spacing:.02em}
  .btn.sec{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700}
  .btn:active{transform:scale(.99)}
  .btnrow{display:flex;gap:10px}.btnrow>*{flex:1}

  /* ---- Form fields ---- */
  label.fld{display:block;margin-bottom:13px}
  label.fld .lab{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.06em}
  .fld input,.fld select{width:100%;padding:13px;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;color:var(--text)}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--accent)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:11px 14px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);
    font-weight:700;font-size:14px;color:var(--muted);flex:1;text-align:center;min-width:30%}
  .chip.on{background:var(--accent);color:#0a0d14;border-color:var(--accent)}
  .chip.on.blue{background:var(--accent2);border-color:var(--accent2)}

  /* ---- Bottom tab bar ---- */
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;
    background:rgba(13,17,27,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding-bottom:var(--safe-b)}
  nav.tabs button{flex:1;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--dim);font-size:10px;font-weight:700;letter-spacing:.03em}
  nav.tabs button .ic{font-size:20px;line-height:1}
  nav.tabs button.on{color:var(--accent)}

  /* ====================================================================
     GRIT-STYLE WORKOUT SHEET
     ==================================================================== */
  .sheet{border:1px solid #000;border-radius:12px;overflow:hidden;background:#0c1019;margin-bottom:13px}
  .sheet .banner{background:#000;color:#fff;text-align:center;padding:7px;font-size:11px;font-weight:800;
    letter-spacing:.22em;border-bottom:1px solid #222;text-transform:uppercase}
  .sheet .motto{background:#000;color:#fff;text-align:center;font-weight:900;
    font-size:34px;line-height:.96;letter-spacing:.04em;padding:6px 8px 13px;text-transform:uppercase;
    font-stretch:condensed}
  .sheet .subhead{background:#1b2a16;color:#cfe9a8;display:flex;align-items:center;justify-content:space-between;
    padding:6px 11px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    border-top:1px solid #2c3f22;border-bottom:1px solid #2c3f22}
  .gwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.grit{border-collapse:collapse;table-layout:fixed;font-size:12px}
  table.grit td,table.grit th{border:1px solid #0a0f1a;padding:0;overflow:hidden}
  .gx-tag{background:var(--navytag);color:var(--accent);font-weight:900;text-align:center;
    position:sticky;left:0;z-index:2;font-size:11px}
  .gx-name{background:var(--navy);color:#fff;padding:9px 10px!important;position:sticky;left:28px;z-index:2;
    border-right:2px solid #000;overflow-wrap:anywhere;word-break:break-word}
  .gx-name .nm{font-weight:800;font-size:13px;line-height:1.15;overflow-wrap:anywhere}
  .gx-name .dt{color:#9fc0ff;font-size:10.5px;margin-top:2px;line-height:1.2;overflow-wrap:anywhere}
  .gx-name .sw{margin-top:5px;display:inline-block;font-size:10px;color:#0a0d14;background:var(--accent);
    padding:2px 7px;border-radius:10px;font-weight:800}
  .gx-set{background:#11151f;min-width:62px;vertical-align:top}
  .seth{background:#0c0f17;color:var(--muted);font-size:9px;font-weight:800;text-align:center;
    padding:5px 0!important;letter-spacing:.06em}
  .gx-set .tgt{display:block;text-align:center;color:var(--dim);font-size:9px;padding:3px 0 2px}
  .gx-set .ins{display:flex;gap:2px;padding:0 3px 4px}
  .gx-set input{width:50%;min-width:0;padding:6px 2px;text-align:center;background:#1a212e;
    border:1px solid #2a3344;border-radius:6px;color:#fff;font-size:12px;font-weight:700}
  .gx-set input.done{background:rgba(180,255,61,.16);border-color:var(--accent);color:var(--accent)}
  .gx-set input::placeholder{color:#4a5366;font-weight:600}
  .gbar{background:#06080d;color:#c7d2e0;text-align:center;font-size:10.5px;font-weight:700;
    letter-spacing:.08em;padding:7px;text-transform:uppercase;border-top:1px solid #000}
  .gx-note{background:#0e1320;color:var(--muted);min-width:90px;max-width:120px;font-size:10px;padding:8px!important;vertical-align:top;overflow-wrap:anywhere;word-break:break-word}

  /* ---- progress ring / bars ---- */
  .macrobar{margin:9px 0}
  .macrobar .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;font-weight:700}
  .track{height:9px;background:var(--panel2);border-radius:6px;overflow:hidden}
  .track>span{display:block;height:100%;border-radius:6px}

  .listitem{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .listitem:last-child{border-bottom:none}
  .listitem .t{flex:1}.listitem .t b{font-weight:700;font-size:14px}
  .listitem .t small{color:var(--muted);font-size:11.5px}
  .tagdot{width:8px;height:8px;border-radius:50%;flex:none}

  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px;margin-bottom:13px}
  .seg button{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:13px;color:var(--muted)}
  .seg button.on{background:var(--accent);color:#0a0d14}

  .empty{text-align:center;color:var(--dim);padding:26px 10px;font-size:13px}
  .hero{font-size:13px;color:var(--muted);line-height:1.5}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .kv:last-child{border:none}.kv .k{color:var(--muted)}
  .stepwrap{display:flex;gap:9px;margin:14px 0}
  .stepdot{flex:1;height:4px;border-radius:3px;background:var(--line)}
  .stepdot.on{background:var(--accent)}
  a{color:var(--accent2)}
  .modal{position:fixed;inset:0;z-index:60;background:rgba(4,6,10,.7);display:flex;align-items:flex-end;
    justify-content:center;padding:0}
  .sheetmodal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;
    width:100%;max-width:560px;max-height:82vh;overflow:auto;padding:18px 16px calc(20px + var(--safe-b))}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 14px}
</style>
</head>
<body>

<header class="app">
  <div class="brand"><span class="dot"></span> FIT<small>COACH</small></div>
  <button class="hbtn" id="hbtn" style="display:flex;align-items:center;gap:6px" onclick="openProfiles()">Profile</button>
</header>

<main id="view"></main>

<nav class="tabs" id="tabbar"></nav>

<div id="modalRoot"></div>

<script src="data.js"></script>
<script>
/* ============================================================================
   FitCoach app
   ========================================================================== */
const {PROGRAMS, SWAPS, EQUIP, NUTRITION, RECIPES} = window.FITDATA;
const LB_PER_KG = 2.2046226;
const $ = (id)=>document.getElementById(id);
const prog = (id)=>PROGRAMS.find(p=>p.id===id);
const isoLocal = (d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayISO = ()=> isoLocal(new Date());
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtDate = (d)=>`${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][(d.getDay()+6)%7]} · ${MON[d.getMonth()]} ${d.getDate()}`;

/* ---- desk / at-work movement library (no equipment) ---- */
const DESK=[
  {n:'Chair Squats',short:'SQUATS',reps:'15 reps',d:'Stand up from your chair and sit back down under control. No hands.'},
  {n:'Desk Push-Ups',short:'PUSH-UPS',reps:'12 reps',d:'Hands on the desk edge, body straight, lower your chest and press back up.'},
  {n:'Calf Raises',short:'CALVES',reps:'20 reps',d:'Stand tall, rise onto your toes, lower slowly. Hold the desk for balance.'},
  {n:'Seated Leg Raises',short:'LEG RAISE',reps:'12 / leg',d:'Sit tall, extend one leg straight out, hold 2s, lower. Alternate.'},
  {n:'Glute Squeezes',short:'GLUTES',reps:'20 × 3s',d:'Sitting or standing, squeeze your glutes hard and hold 3 seconds.'},
  {n:'Wall Sit',short:'WALL SIT',reps:'45 sec',d:'Back flat against the wall, thighs parallel to the floor, hold.'},
  {n:'Desk Plank',short:'PLANK',reps:'40 sec',d:'Forearms on the desk, body in a straight line, brace your core.'},
  {n:'Standing Knee Drives',short:'KNEES',reps:'30 sec',d:'Drive one knee up to hip height, alternate quickly, pump the arms.'},
  {n:'Chair Dips',short:'DIPS',reps:'12 reps',d:'Hands on a sturdy chair edge, slide off, dip down and press up.'},
  {n:'Shoulder Rolls + Neck Stretch',short:'MOBILITY',reps:'30 sec',d:'Roll shoulders back, then gently stretch the neck to each side.'},
  {n:'Standing Side Bends',short:'SIDE BEND',reps:'10 / side',d:'Reach one arm overhead and bend to the opposite side for the obliques.'},
  {n:'March in Place',short:'MARCH',reps:'60 sec',d:'March bringing knees high and pumping the arms to get the heart rate up.'},
  {n:'Hip Flexor Stretch',short:'HIPS',reps:'30s / side',d:'Step into a small lunge, tuck the hips, feel the stretch. Switch sides.'},
  {n:'Desk Mountain Climbers',short:'CLIMBERS',reps:'30 sec',d:'Hands on the desk, drive knees toward chest alternately, fast but controlled.'},
];
const WHEEL=[DESK[0],DESK[1],DESK[2],DESK[6],DESK[5],DESK[8],DESK[11],DESK[13]]; // 8 segments
const fmt = (n)=> (Math.round(n*10)/10).toLocaleString();
const esc = (s)=> (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- persistence (multi-profile) ----------
   DB = { activeId, profiles:{ id: <per-person data> } }
   S  = the active person's data object (a live reference into DB) — every view
        reads S.profile / S.logs / S.weights / S.food etc. so switching is instant. */
const KEY='fitcoach.v1';        // legacy single-profile key (migrated once)
const DBKEY='fitcoach.db.v1';   // multi-profile container
function newId(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function blankData(){ return { profile:null, logs:{}, weights:[], food:{}, swaps:{}, moveLog:{},
  viewWeek:null, openSessions:null, showPast:false, showTuning:false, lastWeighPrompt:null, bestStreak:0 }; }
function loadDB(){
  try{ const d=JSON.parse(localStorage.getItem(DBKEY)); if(d&&d.profiles) return d; }catch(e){}
  try{ const old=JSON.parse(localStorage.getItem(KEY)); if(old&&old.profile){ const id=newId(); return {activeId:id,profiles:{[id]:old}}; } }catch(e){}
  return { activeId:null, profiles:{} };
}
let DB = loadDB();
let S;
function useActive(){
  if(!DB.activeId || !DB.profiles[DB.activeId]){
    const ids=Object.keys(DB.profiles);
    if(ids.length) DB.activeId=ids[0];
    else { const id=newId(); DB.profiles[id]=blankData(); DB.activeId=id; }
  }
  S = DB.profiles[DB.activeId];
}
useActive();
function save(){ DB._ts=Date.now(); localStorage.setItem(DBKEY, JSON.stringify(DB)); cloudQueuePush(); }

/* ---------- date / schedule helpers ---------- */
function weekdayIdx(date){ return (date.getDay()+6)%7; } // Mon=0..Sun=6
function currentWeek(){
  if(!S.profile) return 0;
  const start = new Date(S.profile.startDate+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.floor((now-start)/86400000);
  const w = Math.floor(diff/7);
  const p = prog(S.profile.programId);
  return Math.max(0, Math.min(w, (p?p.weeks:12)-1));
}
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

/* ---------- the "trainer" — picks a program ---------- */
const EQRANK={gym:3,dumbbell:2,minimal:1};
function canDo(userEquip, progEquip){ return EQRANK[userEquip] >= EQRANK[progEquip]; }
function recommend(p){
  if(p.style==='classes') return 'lean_flow';   // Pilates / hot yoga / cardio focus
  const order={lose:['gbb6','f12','shred8'],gain:['growth','transform12'],recomp:['gbb6','growth','transform12'],general:['transform12','gbb6']};
  const list=order[p.goal]||['gbb6'];
  let pick=list.find(id=>canDo(p.equip,prog(id).equip));
  if(!pick){ const any=PROGRAMS.filter(x=>canDo(p.equip,x.equip)); pick = any.length?any[0].id : 'shred8'; }
  return pick;
}
function whyPicked(p,id){
  const pr=prog(id);
  const goalTxt={lose:'fat loss',gain:'building muscle',recomp:'recomping',general:'general fitness'}[p.goal];
  let s=`Based on your goal (${goalTxt}) and equipment (${EQUIP[p.equip].label.toLowerCase()}), I matched you to <b>${pr.name}</b>. `;
  if(!canDo(p.equip,pr.equip)) s+=`It normally assumes more kit — tap any exercise to <b>swap</b> it for one you can do.`;
  else s+=pr.blurb;
  return s;
}

/* ============================================================================
   ONBOARDING
   ========================================================================== */
const AVATARS=['💪','🧘‍♀️','🏃‍♀️','🏋️','🤸‍♀️','🔥','🌸','⭐'];
let ob = {step:0, d:{sex:'male',activity:'moderate',goal:'lose',equip:'gym',style:'gym',days:5,unit:'imperial',ft:5,in:10,lb:180,goalLb:170,age:28,name:'',avatar:'💪'}};
function startOnboarding(){ ob={step:0,d:{sex:'female',activity:'moderate',goal:'lose',equip:'dumbbell',style:'gym',days:5,unit:'imperial',ft:5,in:6,lb:150,goalLb:135,age:28,name:'',avatar:'💪'}}; renderOnboard(); }
function renderOnboard(){
  $('tabbar').classList.add('hide');
  const steps=[obWelcome,obStats,obGoal,obStyle,obEquip,obReview];
  $('view').innerHTML = `<div class="stepwrap">${steps.map((_,i)=>`<div class="stepdot ${i<=ob.step?'on':''}"></div>`).join('')}</div>`
    + `<div id="obc"></div>`;
  steps[ob.step]();
}
function obSet(k,v){ ob.d[k]=v; renderOnboard(); }
function obNext(){ ob.step++; renderOnboard(); }
function obBack(){ ob.step--; renderOnboard(); }

function obWelcome(){
  $('obc').innerHTML = `
  <div class="card">
    <h2 style="font-size:26px;margin-bottom:8px">Hey 👋 I'm your coach.</h2>
    <p class="hero">I'll build a training, diet and weight plan tailored to you. First, a few quick things.</p>
    <label class="fld"><span class="lab">What should I call you?</span>
      <input id="i_name" placeholder="Your name" value="${esc(ob.d.name)}"></label>
    <span class="lab">Pick an avatar</span>
    <div class="chips" style="margin-bottom:14px">
      ${AVATARS.map(a=>`<button class="chip ${ob.d.avatar===a?'on':''}" style="font-size:22px;min-width:18%;flex:none;padding:9px 0" onclick="obSet('avatar','${a}')">${a}</button>`).join('')}
    </div>
    <button class="btn" onclick="ob.d.name=$('i_name').value.trim();obNext()">Let's go →</button>
  </div>`;
}
function obStyle(){
  const d=ob.d;
  const opts=[['gym','Gym & weights','Strength-focused training programs'],
    ['classes','Classes & flow','Pilates, hot yoga, cardio + light weights — lean & toned'],
    ['mix','A mix of both','Weights plus some classes']];
  $('obc').innerHTML=`
  <div class="card">
    <h3>How do you like to train?</h3>
    <div class="chips" style="flex-direction:column">
    ${opts.map(([k,t,s])=>`<button class="chip ${d.style===k?'on':''}" style="text-align:left;min-width:100%" onclick="obSet('style','${k}')">
      <b style="font-size:15px">${t}</b><br><span style="font-weight:600;font-size:12px;opacity:.8">${s}</span></button>`).join('')}
    </div>
    <div class="btnrow" style="margin-top:6px"><button class="btn ghost" onclick="obBack()">Back</button>
      <button class="btn" onclick="obNext()">Next →</button></div>
  </div>`;
}
function obStats(){
  const d=ob.d, imp=d.unit==='imperial';
  $('obc').innerHTML = `
  <div class="card">
    <h3>About you</h3>
    <div class="seg">
      <button class="${imp?'on':''}" onclick="obSet('unit','imperial')">lb / ft</button>
      <button class="${!imp?'on':''}" onclick="obSet('unit','metric')">kg / cm</button>
    </div>
    <div class="row">
      <label class="fld"><span class="lab">Sex</span>
        <select id="i_sex">${['male','female'].map(s=>`<option ${d.sex===s?'selected':''}>${s}</option>`).join('')}</select></label>
      <label class="fld"><span class="lab">Age</span><input id="i_age" inputmode="numeric" value="${d.age}"></label>
    </div>
    ${imp?`
    <div class="row">
      <label class="fld"><span class="lab">Height ft</span><input id="i_ft" inputmode="numeric" value="${d.ft}"></label>
      <label class="fld"><span class="lab">in</span><input id="i_in" inputmode="numeric" value="${d.in}"></label>
    </div>
    <div class="row">
      <label class="fld"><span class="lab">Weight (lb)</span><input id="i_lb" inputmode="decimal" value="${d.lb}"></label>
      <label class="fld"><span class="lab">Goal weight (lb)</span><input id="i_goal" inputmode="decimal" value="${d.goalLb}"></label>
    </div>`:`
    <label class="fld"><span class="lab">Height (cm)</span><input id="i_cm" inputmode="numeric" value="${Math.round(((d.ft*12)+ +d.in)*2.54)}"></label>
    <div class="row">
      <label class="fld"><span class="lab">Weight (kg)</span><input id="i_kg" inputmode="decimal" value="${Math.round(d.lb/LB_PER_KG)}"></label>
      <label class="fld"><span class="lab">Goal (kg)</span><input id="i_goalkg" inputmode="decimal" value="${Math.round(d.goalLb/LB_PER_KG)}"></label>
    </div>`}
    <label class="fld"><span class="lab">How active are you day-to-day?</span>
      <select id="i_act">${Object.entries(NUTRITION.activityFactors).map(([k,v])=>`<option value="${k}" ${d.activity===k?'selected':''}>${v.label}</option>`).join('')}</select></label>
    <div class="btnrow"><button class="btn ghost" onclick="obBack()">Back</button>
      <button class="btn" onclick="saveStats()">Next →</button></div>
  </div>`;
}
function saveStats(){

/* build a dated session for every calendar day of the program */
function buildSessions(pr){
  const start=new Date(S.profile.startDate+'T00:00:00');
  const out=[];
  for(let i=0;i<pr.weeks*7;i++){
    const dt=new Date(start); dt.setDate(start.getDate()+i);
    const w=Math.floor(i/7), wd=weekdayIdx(dt);
    const dayId=pr.schedule(w,wd);
    out.push({iso:isoLocal(dt), date:dt, w, wd, dayId, isRest:!dayId});
  }
  return out;
}
/* which exercise set a lift day shows — home (dumbbell) or gym (barbell/machine) */
function curLiftMode(){ const p=S.profile; if(!p) return 'home'; if(p.liftMode) return p.liftMode; return p.equip==='gym'?'gym':'home'; }
function dayBlocks(day){ return (day.gymBlocks && curLiftMode()==='gym') ? day.gymBlocks : day.blocks; }

function sessionStatus(pr,w,dayId){
  const day=pr.days[dayId];
  const log=(S.logs[pr.id]||{})[w]&&S.logs[pr.id][w][dayId];
  if(day.session){ const d=!!(log&&log.__done); return {done:d?1:0,total:1,any:d}; }
  const total=dayBlocks(day).filter(b=>!b.bar).length;
  if(!log) return {done:0,total,any:false};
  let done=0; Object.keys(log).forEach(k=>{ if(k==='__done')return; const sets=log[k]; if(Array.isArray(sets)&&sets.some(s=>s&&s.done)) done++; });
  return {done,total,any:done>0};
}

function logFor(pid,w,dayId){
  S.logs[pid]=S.logs[pid]||{}; S.logs[pid][w]=S.logs[pid][w]||{};
  S.logs[pid][w][dayId]=S.logs[pid][w][dayId]||{};
  return S.logs[pid][w][dayId];
}
function swapKey(pid,dayId,exIdx){ return `${pid}.${dayId}.${exIdx}`; }
function exName(pr,dayId,exIdx,orig){ const k=swapKey(pr.id,dayId,exIdx); return (S.swaps&&S.swaps[k])||orig; }

/* parse a reps spec into a per-set target {label, def(number|null)} */
function numFrom(p){
  const m=String(p).toLowerCase().replace(/–/g,'-').trim();
  if(/amrap|circuit|goal|min|sec/.test(m)) return null;     // effort/time based
  if(/^\d+\s*s$/.test(m)) return null;                       // "20s"
  const range=m.match(/(\d+)\s*-\s*(\d+)/);
  if(range) return parseInt(range[2]);                       // range -> top as goal
  const n=m.match(/\d+/);
  return n?parseInt(n[0]):null;
}
function repTargets(repsStr,nSets){
  const s=String(repsStr).trim();
  const parts = /[·,]/.test(s) ? s.split(/[·,]/).map(x=>x.trim()) : null;
  return Array.from({length:nSets},(_,i)=>{
    const lab = parts ? (parts[i]!=null?parts[i]:parts[parts.length-1]) : s;
    return {label:lab, def:numFrom(lab)};
  });
}
function sheetHTML(pr,dayId,w,compact){
  const day=pr.days[dayId];
  if(day.session) return sessionSheet(pr,dayId,w);
  const log=logFor(pr.id,w,dayId);
  const noWt=!!day.noWeight;
  const blocks=dayBlocks(day);
  const exSets=blocks.filter(b=>!b.bar).map(b=>+b.sets||1);
  const maxSets = noWt ? Math.max(1,...exSets) : Math.max(3,...exSets,3);
  let exIdx=-1;
  const rows=blocks.map(b=>{
    if(b.bar) return `<tr><td class="gbar" colspan="${maxSets+3}">${esc(b.bar)}</td></tr>`;
    exIdx++; const ei=exIdx;
    const nSets=+b.sets||(noWt?1:3);
    const name=exName(pr,dayId,ei,b.name);
    const sets=log[ei]||[];
    const tgts=repTargets(b.reps,nSets);
    const cells=[];
    for(let s=0;s<maxSets;s++){
      if(s<nSets){
        const v=sets[s]||{};
        const t=tgts[s];
        const done=v.done?'done':'';
        if(noWt){
          // class/Pilates day: no weight — show target + a tap-to-complete check
          cells.push(`<td class="gx-set" style="text-align:center;padding:6px 5px"><span class="tgt">${esc(t.label)}</span>
            <button onclick="toggleDone('${pr.id}',${w},'${dayId}',${ei},${s})"
              style="width:100%;margin-top:4px;padding:7px 0;border-radius:7px;font-weight:800;font-size:13px;
              background:${v.done?'rgba(180,255,61,.18)':'#1a212e'};color:${v.done?'var(--accent)':'#6b7689'};
              border:1px solid ${v.done?'var(--accent)':'#2a3344'}">${v.done?'✓':'•'}</button></td>`);
        } else {
          const repVal = v.reps!=null ? v.reps : (t.def!=null ? t.def : '');
          const repPh  = t.def!=null ? 'rep' : esc(t.label);
          const defAttr= t.def!=null ? t.def : '';

function setLog(el,pid,w,dayId,ei,s,field,def){
  const log=logFor(pid,w,dayId); log[ei]=log[ei]||[]; log[ei][s]=log[ei][s]||{};

  if(field==='wt'){

function guessCat(name,note){

  if(/squat|leg press|lunge|step|extension|hack|wall sit/.test(n)) return 'Quads / Squat';
  if(/rdl|deadlift|hip thrust|glute|hamstring|curl machine|good morning|bridge|hyperext/.test(n)) return 'Hamstrings / Hinge';
  if(/overhead|shoulder press|arnold|lateral raise|front raise|military|pike/.test(n)) return 'Vertical Push';
  if(/bench|chest|fly|push-?up|press-?up|incline|dip(?!s? bar)/.test(n)) return 'Horizontal Push';
  if(/pull-?up|chin-?up|pulldown|lat /.test(n)) return 'Vertical Pull';
  if(/row|face pull|rear delt/.test(n)) return 'Horizontal Pull';
  if(/bicep|curl/.test(n)) return 'Biceps';
  if(/tricep|skull|pushdown|kickback|dip/.test(n)) return 'Triceps';
  if(/plank|crunch|sit-?up|leg raise|bicycle|twist|climber|core|abs/.test(n)) return 'Core';
  return 'Horizontal Push';
}

/* ---------- weight analytics ---------- */
function sortedWeights(){ return S.weights.slice().sort((a,b)=>a.d<b.d?-1:1); }
function addDaysD(date,n){ const d=new Date(date); d.setDate(d.getDate()+Math.round(n)); return d; }
function dayspan(a,b){ return (new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000; }
function ensureGoalDefaults(){
  const p=S.profile; if(!p) return;
  if(!p.weighCadence) p.weighCadence='daily';
  if(p.targetRate==null){ const dir=goalDir(); p.targetRate = dir==='lose'?1 : dir==='gain'?0.5 : 0; }
}
function goalDir(){ const p=S.profile; const start=S.weights.length?sortedWeights()[0].w:p.weightLb;
  return p.goalLb<start-0.5?'lose':p.goalLb>start+0.5?'gain':'maintain'; }
function trendWeight(ws,cadence){
  if(!ws.length) return S.profile.weightLb;
  if(cadence==='weekly') return ws[ws.length-1].w;
  const lastD=ws[ws.length-1].d;
  const wk=ws.filter(e=>dayspan(e.d,lastD)<=6);
  return wk.reduce((a,e)=>a+e.w,0)/wk.length;            // 7-day trend (kills daily noise)
}
function recentWeights(ws,days){ if(!ws.length) return ws; const last=ws[ws.length-1].d;
  return ws.filter(e=>dayspan(e.d,last)<=days); }
function ratePerWeek(ws){                                  // signed lb/week via least squares
  if(ws.length<2) return null;
  const t0=new Date(ws[0].d+'T00:00:00').getTime();
  const P=ws.map(e=>({x:(new Date(e.d+'T00:00:00').getTime()-t0)/86400000,y:e.w}));
  if(P[P.length-1].x<3) return null;                       // need a few days of spread
  const n=P.length, sx=P.reduce((a,p)=>a+p.x,0), sy=P.reduce((a,p)=>a+p.y,0);
  const sxx=P.reduce((a,p)=>a+p.x*p.x,0), sxy=P.reduce((a,p)=>a+p.x*p.y,0);
  const den=n*sxx-sx*sx; if(!den) return null;
  return ((n*sxy-sx*sy)/den)*7;
}
function clampK(v){ return Math.max(100,Math.min(400,Math.round(v/50)*50)); }
function optimize(){
  ensureGoalDefaults();
  const p=S.profile, ws=sortedWeights();
  const cadence=p.weighCadence, dir=goalDir();
  const start=ws.length?ws[0].w:p.weightLb;
  const trend=trendWeight(ws,cadence);
  const goal=p.goalLb, target=p.targetRate||0;
  const lbToGo=Math.abs(trend-goal);
  const slope=ratePerWeek(recentWeights(ws,28));          // signed
  const o={dir,cadence,start,trend,goal,target,lbToGo,slope,
           actual:slope==null?null:Math.abs(slope),
           toward: slope==null?null:(dir==='lose'?slope<0:dir==='gain'?slope>0:Math.abs(slope)<0.25)};
  // projection at actual rate
  if(o.toward && o.actual>0.05){ o.projWeeks=lbToGo/o.actual; o.projDate=addDaysD(new Date(),o.projWeeks*7); }
  if(target>0){ o.tgtWeeks=lbToGo/target; o.tgtDate=addDaysD(new Date(),o.tgtWeeks*7); }
  // status + coaching
  const cals=dietTargets().cals;
  const pctBW = o.actual!=null && trend? (o.actual/trend*100):0;   // %bw/week
  if(slope==null){ o.status='Gathering data'; o.color='var(--muted)';
    o.advice=`Log ${cadence==='daily'?'a few days':'2–3 weeks'} of weigh-ins and I'll read your real rate and tune your calories.`; }
  else if(lbToGo<1){ o.status='Goal reached 🎯'; o.color='var(--good)';
    o.advice='You hit your goal — switch to maintenance in the Coach tab, or set a new target.'; }
  else if(!o.toward || o.actual<0.1){ o.status='Stalled'; o.color='var(--warn)';
    if(dir==='lose') o.advice=`Scale isn't moving. Trim ~250 kcal/day (to ~${cals-250}) or add ~2,000 steps / one LISS walk. Re-check in a week.`;
    else o.advice=`Not gaining. Add ~250 kcal/day (to ~${cals+250}) and make sure you're hitting protein.`; }
  else if(o.actual < target*0.7){ const gap=target-o.actual; const k=clampK(gap*500); o.status='Behind pace'; o.color='var(--warn)';
    o.advice=dir==='lose'?`Losing ${fmt(o.actual)}/wk vs ${fmt(target)} target. Cut ~${k} kcal/day (to ~${cals-k}) or add steps to speed it up.`
                          :`Gaining ${fmt(o.actual)}/wk vs ${fmt(target)} target. Add ~${k} kcal/day (to ~${cals+k}).`; }
  else if(o.actual > target*1.5 || (dir==='lose'&&pctBW>1)){ const ex=o.actual-target; const k=clampK(ex*500); o.status='Too fast'; o.color='var(--warn)';
    o.advice=dir==='lose'?`Dropping ${fmt(o.actual)}/wk — fast enough to risk muscle. Add ~${k} kcal/day (to ~${cals+k}) and keep protein high.`
                          :`Gaining ${fmt(o.actual)}/wk — that's mostly fat. Cut ~${k} kcal/day (to ~${cals-k}).`; }
  else { o.status='On track ✅'; o.color='var(--good)';
    o.advice=`${fmt(o.actual)} lb/wk — right on your ${fmt(target)} lb target. Hold ~${cals} kcal/day and keep showing up.`; }
  return o;
}
function weighStreak(ws){
  const set=new Set(ws.map(e=>e.d)); let n=0, d=new Date();
  if(!set.has(isoLocal(d))){ d.setDate(d.getDate()-1); if(!set.has(isoLocal(d))) return 0; }
  while(set.has(isoLocal(d))){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function loggedThisPeriod(ws,cadence){
  if(!ws.length) return false;
  const last=ws[ws.length-1].d;
  return cadence==='daily' ? last===todayISO() : dayspan(last,todayISO())<7;
}
function weightDeltaText(){
  if(!S.weights.length) return '';
  const o=optimize(); const d=o.trend-o.goal;
  if(Math.abs(d)<1) return 'at goal 🎯';
  return (d>0?`${fmt(Math.abs(d))} lb to go`:`${fmt(Math.abs(d))} lb past goal`);
}

  $('view').innerHTML=`

      <div style="text-align:center"><div class="muted" style="font-size:11px;font-weight:700">CHANGE</div>
        <div class="big" style="color:${changed<0?'var(--good)':changed>0?'var(--warn)':'var(--text)'}">${changed>0?'+':''}${fmt(changed)}</div></div>

      <span class="muted" style="font-size:12px;margin-left:6px">${weightDeltaText()}</span></div>

  ${needWeigh?`<div class="card" style="border-color:var(--accent);display:flex;align-items:center;gap:12px">

  <div class="card"><h3>Coach's read</h3>

function chartHTML(ws,goal){
  if(ws.length<2) return '<div class="empty">Log a couple of days to see your trend line.</div>';
  const W=320,H=150,pad=10;
  // 7-day moving average (trend) per point
  const ma=ws.map((e,i)=>{ const win=ws.filter(x=>dayspan(x.d,e.d)<=6 && x.d<=e.d); return win.reduce((a,x)=>a+x.w,0)/win.length; });
  const vals=ws.map(x=>x.w).concat(ma,[goal]);
  let mn=Math.min(...vals),mx=Math.max(...vals); if(mn===mx){mn-=2;mx+=2;} const rng=mx-mn;
  const x=i=>pad+i*(W-2*pad)/(ws.length-1);
  const y=v=>pad+(1-(v-mn)/rng)*(H-2*pad);
  const maPts=ma.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const gy=y(goal);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${gy}" x2="${W-pad}" y2="${gy}" stroke="#7ee0ff" stroke-dasharray="4 4" stroke-width="1"/>
    <text x="${W-pad}" y="${gy-4}" fill="#7ee0ff" font-size="9" text-anchor="end">goal ${fmt(goal)}</text>
    ${ws.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.w)}" r="2.2" fill="#41506a"/>`).join('')}
    <polyline points="${maPts}" fill="none" stroke="#b4ff3d" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <text x="${pad}" y="${H-2}" fill="#5d6675" font-size="8">dots = daily · line = 7-day trend</text>
  </svg>`;
}

function hourLabel(h){ const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0)hh=12; return hh+' '+ap; }
function hourOpts(sel){ let o=''; for(let h=5;h<=22;h++) o+=`<option value="${h}" ${h===sel?'selected':''}>${hourLabel(h)}</option>`; return o; }
function wheelSVG(){
  const n=WHEEL.length, seg=360/n, R=140, cx=150, cy=150;
  const cols=['#15294f','#1f3d77']; let paths='', labels='';
  for(let i=0;i<n;i++){
    const a0=(i*seg-90)*Math.PI/180, a1=((i+1)*seg-90)*Math.PI/180;
    const x0=cx+R*Math.cos(a0), y0=cy+R*Math.sin(a0), x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
    paths+=`<path d="M${cx},${cy} L${x0.toFixed(1)},${y0.toFixed(1)} A${R},${R} 0 0,1 ${x1.toFixed(1)},${y1.toFixed(1)} Z" fill="${cols[i%2]}" stroke="#0a0d14" stroke-width="1.5"/>`;
    const am=((i+0.5)*seg-90)*Math.PI/180, lr=R*0.64;
    const lx=cx+lr*Math.cos(am), ly=cy+lr*Math.sin(am), rot=(i+0.5)*seg;
    labels+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" fill="#dfe8ff" font-size="11" font-weight="800" text-anchor="middle" dominant-baseline="middle" transform="rotate(${rot.toFixed(1)},${lx.toFixed(1)},${ly.toFixed(1)})">${esc(WHEEL[i].short)}</text>`;
  }
  return `<svg viewBox="0 0 300 300" id="wheel" style="width:100%;max-width:290px;display:block;margin:0 auto;transform-origin:50% 50%;transition:transform 3.2s cubic-bezier(.16,.7,.18,1)">
    <circle cx="${cx}" cy="${cy}" r="${R+3}" fill="#0a0d14" stroke="#2c3f22"/>${paths}${labels}
    <circle cx="${cx}" cy="${cy}" r="22" fill="#b4ff3d"/></svg>`;
}
let wheelRot=0, spinning=false;
function spinWheel(){
  if(spinning) return; spinning=true;
  const n=WHEEL.length, seg=360/n;
  const idx=Math.floor(Math.random()*n);
  const desired=(360-((idx+0.5)*seg)%360+360)%360;
  wheelRot = Math.ceil((wheelRot+1)/360)*360 + 360*5 + desired;
  const el=$('wheel'); if(el) el.style.transform=`rotate(${wheelRot}deg)`;
  const b=$('spinBtn'); if(b){ b.disabled=true; b.style.opacity=.5; b.textContent='SPINNING…'; }
  setTimeout(()=>{ spinning=false; if(b){ b.disabled=false; b.style.opacity=1; b.textContent='SPIN AGAIN'; } showMoveResult(WHEEL[idx]); }, 3300);

/* ============================================================================
   CLOUD SYNC (Supabase) — sign in once per device; data auto-syncs.
   The anon key is public by design; row-level security in the database
   guarantees each account can only read/write its own row.
   ========================================================================== */
const CLOUD_URL='';   // ← filled in when the Supabase project exists (or paste in-app)
const CLOUD_KEY='';
const CLOUDKEY='fitcoach.cloud.v1';
let CLOUD = (function(){ try{ return JSON.parse(localStorage.getItem(CLOUDKEY))||{}; }catch(e){ return {}; } })();
function cloudSave(){ localStorage.setItem(CLOUDKEY, JSON.stringify(CLOUD)); }
function cloudCfg(){ const url=(CLOUD.url||CLOUD_URL||'').replace(/\/+$/,''), key=CLOUD.key||CLOUD_KEY||''; return url&&key?{url,key}:null; }
function cloudSignedIn(){ return !!(cloudCfg() && CLOUD.access && CLOUD.user_id); }

async function cloudFetch(path, opts, retry){
  const cfg=cloudCfg(); if(!cfg) throw new Error('not configured');
  const headers=Object.assign({apikey:cfg.key,'Content-Type':'application/json'}, opts.auth!==false&&CLOUD.access?{Authorization:'Bearer '+CLOUD.access}:{}, opts.headers||{});
  const res=await fetch(cfg.url+path,{method:opts.method||'GET',headers,body:opts.body?JSON.stringify(opts.body):undefined});
  if(res.status===401 && !retry && CLOUD.refresh){
    const ok=await cloudRefresh();
    if(ok) return cloudFetch(path,opts,true);
  }
  return res;
}
async function cloudRefresh(){
  try{
    const cfg=cloudCfg();
    const res=await fetch(cfg.url+'/auth/v1/token?grant_type=refresh_token',{method:'POST',
      headers:{apikey:cfg.key,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:CLOUD.refresh})});
    if(!res.ok){ CLOUD.access=null; cloudSave(); return false; }
    const j=await res.json();
    CLOUD.access=j.access_token; CLOUD.refresh=j.refresh_token||CLOUD.refresh; cloudSave(); return true;
  }catch(e){ return false; }
}
async function cloudAuth(mode,email,pass){
  const cfg=cloudCfg(); if(!cfg) return {err:'Connect the sync server first.'};
  const path = mode==='up' ? '/auth/v1/signup' : '/auth/v1/token?grant_type=password';
  try{
    const res=await fetch(cfg.url+path,{method:'POST',headers:{apikey:cfg.key,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})});
    const j=await res.json().catch(()=>({}));
    if(!res.ok) return {err:(j.error_description||j.msg||j.message||'Sign-in failed').slice(0,140)};
    if(mode==='up' && !j.access_token) return {confirm:true};  // email confirmation required
    CLOUD.access=j.access_token; CLOUD.refresh=j.refresh_token;
    CLOUD.user_id=(j.user&&j.user.id)||j.id; CLOUD.email=email; cloudSave();
    return {ok:true};
  }catch(e){ return {err:'Network error — check the URL and your connection.'}; }
}
function cloudSignOut(){ CLOUD.access=null; CLOUD.refresh=null; CLOUD.user_id=null; CLOUD.email=null; cloudSave(); viewCoach(); }

async function cloudPush(){
  if(!cloudSignedIn()) return false;
  try{
    const res=await cloudFetch('/rest/v1/sync',{method:'POST',headers:{Prefer:'resolution=merge-duplicates'},
      body:[{user_id:CLOUD.user_id,data:DB,updated_at:new Date().toISOString()}]});
    if(res.ok){ CLOUD.lastSync=Date.now(); CLOUD.lastErr=null; cloudSave(); return true; }
    CLOUD.lastErr='push '+res.status; cloudSave(); return false;
  }catch(e){ CLOUD.lastErr='offline'; cloudSave(); return false; }
}
async function cloudPull(){
  if(!cloudSignedIn()) return null;
  try{
    const res=await cloudFetch('/rest/v1/sync?select=data,updated_at',{});
    if(!res.ok) return null;
    const rows=await res.json();
    return rows&&rows[0]?rows[0]:null;
  }catch(e){ return null; }
}
function cloudMerge(remote){
  if(!remote||!remote.data||!remote.data.profiles) return false;
  const remoteTs=new Date(remote.updated_at||0).getTime();
  const localTs=DB._ts||0;
  const localHasData=Object.values(DB.profiles).some(d=>d&&d.profile);
  if(!localHasData || remoteTs>localTs){
    // remote is the survivor: overlay remote profiles, keep local-only extras
    Object.assign(DB.profiles, remote.data.profiles);
    Object.keys(DB.profiles).forEach(id=>{ if(!DB.profiles[id]||!DB.profiles[id].profile) delete DB.profiles[id]; });
    if(remote.data.activeId && DB.profiles[remote.data.activeId]) DB.activeId=remote.data.activeId;
    useActive();
    localStorage.setItem(DBKEY, JSON.stringify(DB)); // store without re-queueing a push loop
    return true;
  }
  return false; // local newer — push will win
}
let _pushTimer=null;
function cloudQueuePush(){
  if(!cloudSignedIn()) return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(cloudPush, 2500);   // debounce: one push after a burst of edits
}
async function cloudSyncNow(silent){
  if(!cloudSignedIn()){ if(!silent) toast('Sign in to sync'); return; }
  const remote=await cloudPull();
  const changed=cloudMerge(remote);
  await cloudPush();
  if(changed){ TAB='today'; render(); }
  if(!silent) toast(CLOUD.lastErr?'Sync issue — will retry':'Synced ✓');
  if(TAB==='coach') viewCoach();
}

/* ---- cloud UI ---- */

      <button class="btn" onclick="openCloudSetup()">Connect sync server</button>`;
  } else if(!cloudSignedIn()){
    body=`<p class="hero" style="font-size:12.5px;margin-bottom:12px">Server connected. Sign in (or create the account the first time) — then this device syncs automatically.</p>
      <label class="fld"><span class="lab">Email</span><input id="cl_email" type="email" autocomplete="email" value="${esc(CLOUD.email||'')}"></label>
      <label class="fld"><span class="lab">Password</span><input id="cl_pass" type="password" autocomplete="current-password"></label>
      <div id="cl_msg" class="hero" style="font-size:12px;color:var(--warn);margin-bottom:8px"></div>
      <div class="btnrow"><button class="btn" onclick="doCloudAuth('in')">Sign in</button>
        <button class="btn sec" onclick="doCloudAuth('up')">Create account</button></div>
      <button class="btn ghost" style="margin-top:9px" onclick="openCloudSetup()">Change server</button>`;
  } else {
    body=`<div class="kv"><span class="k">Account</span><b>${esc(CLOUD.email||'')}</b></div>
      <div class="kv"><span class="k">Last sync</span><b>${last?esc(fmtDate(last))+' '+last.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}):'—'}</b></div>
      <div class="kv"><span class="k">Status</span><b style="color:${CLOUD.lastErr?'var(--warn)':'var(--good)'}">${CLOUD.lastErr?'⚠ '+esc(CLOUD.lastErr):'✓ syncing automatically'}</b></div>
      <div class="btnrow" style="margin-top:12px"><button class="btn" onclick="cloudSyncNow()">Sync now</button>
        <button class="btn sec" onclick="cloudSignOut()">Sign out</button></div>`;
  }
  return `<div class="card" style="border-color:#2c3f22"><h3 style="color:var(--accent)">☁️ Cloud sync</h3>${body}</div>`;
}
function openCloudSetup(){
  modal(`<div class="grab"></div><h3 style="margin-bottom:8px">Connect sync server</h3>
    <p class="hero" style="font-size:12px;margin-bottom:12px">From your Supabase project: <b>Settings → API</b>. Paste the two values — this is a one-time setup per device.</p>
    <label class="fld"><span class="lab">Project URL</span><input id="cs_url" placeholder="https://xxxx.supabase.co" value="${esc(CLOUD.url||CLOUD_URL||'')}"></label>
    <label class="fld"><span class="lab">Anon public key</span><input id="cs_key" placeholder="eyJ…" value="${esc(CLOUD.key||CLOUD_KEY||'')}"></label>
    <button class="btn" onclick="saveCloudSetup()">Save</button>
    <button class="btn ghost" style="margin-top:9px" onclick="closeModal()">Cancel</button>`);
}
function saveCloudSetup(){
  const url=$('cs_url').value.trim(), key=$('cs_key').value.trim();
  if(!/^https:\/\/.+\.supabase\.co$/.test(url.replace(/\/+$/,''))){ toast('That URL doesn\'t look right'); return; }
  if(key.length<40){ toast('That key looks too short'); return; }
  CLOUD.url=url; CLOUD.key=key; cloudSave(); closeModal(); viewCoach(); toast('Server connected — now sign in');
}
async function doCloudAuth(mode){
  const email=$('cl_email').value.trim(), pass=$('cl_pass').value;
  const msg=$('cl_msg');
  if(!email||!pass||pass.length<6){ msg.textContent='Enter your email and a password (6+ characters).'; return; }
  msg.style.color='var(--muted)'; msg.textContent=mode==='up'?'Creating account…':'Signing in…';
  const r=await cloudAuth(mode,email,pass);
  if(r.err){ msg.style.color='var(--warn)'; msg.textContent=r.err; return; }
  if(r.confirm){ msg.style.color='var(--accent2)'; msg.textContent='Check your email to confirm, then come back and Sign in.'; return; }
  toast('Signed in ✓ — syncing');
  await cloudSyncNow(true);
  if(TAB==='coach') viewCoach();
}

/* ---------- backup & restore (local-only data safety) ---------- */
function backupBlob(){ return JSON.stringify({app:'fitcoach',v:1,exported:todayISO(),DB}); }
function exportData(){
  try{
    const blob=new Blob([backupBlob()],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='fitcoach-backup-'+todayISO()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast('Backup downloaded to Files');
  }catch(e){ copyBackup(); }
}
function copyBackup(){
  const txt=backupBlob();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('Backup copied — paste it somewhere safe')).catch(()=>showBackupText(txt));
  } else showBackupText(txt);
}
function showBackupText(txt){
  modal(`<div class="grab"></div><h3 style="margin-bottom:8px">Copy this backup</h3>
    <p class="hero" style="font-size:12px;margin-bottom:10px">Select all and copy. Save it in Notes or email it to yourself.</p>
    <textarea id="bk_out" readonly style="width:100%;height:160px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px;font-size:11px">${esc(txt)}</textarea>
    <button class="btn" style="margin-top:10px" onclick="$('bk_out').select();document.execCommand&&document.execCommand('copy');toast('Copied')">Copy</button>
    <button class="btn ghost" style="margin-top:9px" onclick="closeModal()">Done</button>`);
}
function importFile(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json,text/plain';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>applyImportText(String(r.result)); r.onerror=()=>toast('Couldn\'t read that file'); r.readAsText(f); };
  inp.click();
}
function pasteRestore(){
  modal(`<div class="grab"></div><h3 style="margin-bottom:8px">Paste a backup</h3>
    <p class="hero" style="font-size:12px;margin-bottom:10px">Paste the backup text you copied earlier, then Restore.</p>
    <textarea id="bk_in" placeholder="Paste backup here…" style="width:100%;height:150px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px;font-size:11px"></textarea>
    <button class="btn" style="margin-top:10px" onclick="applyImportText($('bk_in').value)">Restore</button>
    <button class="btn ghost" style="margin-top:9px" onclick="closeModal()">Cancel</button>`);
}
function applyImportText(txt){
  let obj; try{ obj=JSON.parse(txt); }catch(e){ toast('That doesn\'t look like a backup'); return; }
  const incoming = (obj&&obj.DB&&obj.DB.profiles) ? obj.DB
    : (obj&&obj.profiles) ? obj
    : (obj&&obj.profile) ? {activeId:newId(),profiles:{}} : null;
  if(obj&&obj.profile&&incoming){ const id=Object.keys(incoming.profiles)[0]||newId(); incoming.activeId=id; incoming.profiles[id]=obj; }
  if(!incoming||!incoming.profiles){ toast('Not a FitCoach backup'); return; }
  window._pendingRestore=incoming;
  const n=Object.values(incoming.profiles).filter(d=>d&&d.profile).length;
  modal(`<div class="grab"></div><h3>Restore backup</h3>
    <p class="hero" style="margin:10px 0 16px">This backup has <b>${n} profile${n===1?'':'s'}</b>. Merge keeps everyone (recommended); Replace wipes current data first.</p>
    <button class="btn" onclick="doRestore('merge')">Merge — add these profiles</button>
    <button class="btn sec" style="margin-top:9px" onclick="doRestore('replace')">Replace everything</button>
    <button class="btn ghost" style="margin-top:9px" onclick="closeModal()">Cancel</button>`);
}
function doRestore(mode){
  const incoming=window._pendingRestore; if(!incoming){ closeModal(); return; }
  if(mode==='replace'){ DB={activeId:incoming.activeId, profiles:incoming.profiles}; }
  else {
    Object.assign(DB.profiles, incoming.profiles);
    // drop empty placeholder profiles left by a fresh install
    Object.keys(DB.profiles).forEach(id=>{ if(!DB.profiles[id]||!DB.profiles[id].profile) delete DB.profiles[id]; });
    if(incoming.activeId && DB.profiles[incoming.activeId]) DB.activeId=incoming.activeId;
    else if(!DB.profiles[DB.activeId]) DB.activeId=Object.keys(DB.profiles)[0]||null;
  }
  window._pendingRestore=null;
  useActive(); save(); closeModal(); toast('Data restored ✓'); TAB='today'; render(); window.scrollTo(0,0);
}
function openProgramPicker(){
  modal(`<div class="grab"></div><h3 style="margin-bottom:12px">Choose a program</h3>
  ${PROGRAMS.map(x=>`<div class="listitem"><div class="t"><b>${esc(x.name)}</b><br><small>${esc(x.blurb)}</small></div>
    <button class="hbtn" style="color:var(--accent)" onclick="setProgram('${x.id}')">Use</button></div>`).join('')}
  <button class="btn ghost" style="margin-top:12px" onclick="closeModal()">Cancel</button>`);
}
function setProgram(id){ S.profile.programId=id; S.profile.startDate=todayISO(); S.viewWeek=null; save(); closeModal(); go('today'); }
function setLiftMode(m){ S.profile.liftMode=m; save(); viewCoach(); }
function editProfile(){
  const p=S.profile;
  modal(`<div class="grab"></div><h3 style="margin-bottom:12px">Edit profile</h3>
    <label class="fld"><span class="lab">Goal</span>
      <select id="e_goal">${[['lose','Lose / cut'],['gain','Build muscle'],['recomp','Recomp'],['general','General']].map(([k,l])=>`<option value="${k}" ${p.goal===k?'selected':''}>${l}</option>`).join('')}</select></label>
    <label class="fld"><span class="lab">Equipment</span>
      <select id="e_eq">${Object.entries(EQUIP).map(([k,v])=>`<option value="${k}" ${p.equip===k?'selected':''}>${v.label}</option>`).join('')}</select></label>
    <label class="fld"><span class="lab">Activity</span>
      <select id="e_act">${Object.entries(NUTRITION.activityFactors).map(([k,v])=>`<option value="${k}" ${p.activity===k?'selected':''}>${v.label}</option>`).join('')}</select></label>
    <div class="row"><label class="fld"><span class="lab">Weight (lb)</span><input id="e_w" inputmode="decimal" value="${p.weightLb}"></label>
      <label class="fld"><span class="lab">Goal (lb)</span><input id="e_g" inputmode="decimal" value="${p.goalLb}"></label></div>
    <button class="btn" onclick="saveProfile()">Save</button>
    <button class="btn sec" style="margin-top:9px" onclick="closeModal();reRecommend()">Save & re-pick program</button>
    <button class="btn ghost" style="margin-top:9px" onclick="closeModal()">Cancel</button>`);
}
function saveProfile(){
  const p=S.profile; p.goal=$('e_goal').value; p.equip=$('e_eq').value; p.activity=$('e_act').value;
  p.weightLb=+$('e_w').value||p.weightLb; p.goalLb=+$('e_g').value||p.goalLb;
  save(); closeModal(); viewCoach();
}
function reRecommend(){ const id=recommend(S.profile); setProgram(id); }
function resetAll(){ modal(`<div class="grab"></div><h3>Reset everything?</h3>
  <p class="hero" style="margin:10px 0 16px">This clears your profile, logs, weight history and food log on this device.</p>
  <button class="btn" style="background:var(--bad);color:#fff" onclick="localStorage.removeItem(KEY);location.reload()">Yes, wipe it</button>
  <button class="btn ghost" style="margin-top:9px" onclick="closeModal()">Cancel</button>`); }

/* ============================================================================
   MODAL + TOAST
   ========================================================================== */
function modal(html){ $('modalRoot').innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheetmodal">${html}</div></div>`; }
function closeModal(){ $('modalRoot').innerHTML=''; }
function toast(msg){ const t=document.createElement('div'); t.textContent=msg;
  t.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--accent);color:#0a0d14;padding:11px 18px;border-radius:30px;font-weight:800;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.4)';
  document.body.appendChild(t); setTimeout(()=>t.remove(),1400); }

/* ---------- boot ---------- */
render();
maybeWeighPrompt();   // gamified daily weigh-in popup on launch
startMoveTimer();     // hourly move reminders (while the app is open)
if(cloudSignedIn()) cloudSyncNow(true);   // pull newest data on open, push local changes
/* SW-START */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{ reg.update&&reg.update(); }).catch(()=>{});
  let _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(_swReloaded)return; _swReloaded=true; location.reload(); });
}
/* SW-END */
